<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="style.css">
    <title>Etch-A-Sketch</title>
</head>
<body>
    <header >
        <h1>Welcome to Etch-A-Sketch</h1>
        <p>Time to create some pixel art!</p>
    </header>

    <!-- section for controls-->
    <section class="controls">
            <input type="range" min="1" max="100" value="50" class="slider" id="myRange">
            <button id="reset">Add </button>
            <button id="reset">Subtract</button>
            <button id="reset">Reset</button>
            <button id="eraser">Eraser</button>
            <button id="black">Black</button>
            <button id="color">Color</button>
    </section>

    <!--Section for grid-->
    <section class="canvas">
        <div class="container">
            
            <div class="pixel"></div>
            <div class="pixel"></div> 
            <div class="pixel"></div>
            <div class="pixel"></div> 
            <div class="pixel"></div>
            <div class="pixel"></div> 
            <div class="pixel"></div>
            <div class="pixel"></div> 
            <div class="pixel"></div>
            <div class="pixel"></div> 
            <div class="pixel"></div>
            <div class="pixel"></div> 
            <div class="pixel"></div>
            <div class="pixel"></div> 
            <div class="pixel"></div>
            <div class="pixel"></div>
        
        </div>
           
       
    </section>

</body>
</html>
